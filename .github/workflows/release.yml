name: Build Release

on:
  release:
    types: [published]

env:
  PKG_NAME: "tool.hellcat.lace"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version variables
        id: vars
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          ZIP_NAME="${{ env.PKG_NAME }}-${VERSION}.zip"
          ZIP_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${ZIP_NAME}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "zip_name=${ZIP_NAME}" >> $GITHUB_OUTPUT
          echo "zip_url=${ZIP_URL}" >> $GITHUB_OUTPUT

      - name: Update package.json url
        run: |
          jq --arg url "${{ steps.vars.outputs.zip_url }}" '.url = $url' \
            package.json > tmp.json
          mv tmp.json package.json

      - name: Build zip
        run: |
          zip -r "${{ steps.vars.outputs.zip_name }}" . -x ".git/*" -x ".github/*"

      - name: Upload zip to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.vars.outputs.zip_name }}

      - name: Build VPM package listing
        uses: vrchat-community/package-list-action@v3.5.3
        with:
          repos: '["source.json"]'

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: Website
